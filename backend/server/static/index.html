<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Meetily</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f9;
      --panel: #ffffff;
      --text: #1d2430;
      --muted: #697386;
      --line: #dde3ea;
      --blue: #2563eb;
      --blue-soft: #eaf1ff;
      --gray-soft: #eef1f4;
      --shadow: 0 18px 50px rgba(20, 32, 48, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    button,
    input {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    .shell {
      width: min(1280px, 100%);
      margin: 0 auto;
      padding: 24px;
    }

    .topbar {
      display: grid;
      grid-template-columns: minmax(180px, 280px) minmax(260px, 1fr);
      gap: 18px;
      align-items: center;
      margin-bottom: 18px;
    }

    .brand h1 {
      margin: 0;
      font-size: 24px;
      line-height: 1.1;
      letter-spacing: 0;
    }

    .brand p {
      margin: 5px 0 0;
      color: var(--muted);
      font-size: 14px;
    }

    .search {
      position: relative;
    }

    .search input {
      width: 100%;
      height: 46px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 0 16px;
      background: var(--panel);
      color: var(--text);
      outline: none;
      box-shadow: 0 8px 24px rgba(20, 32, 48, 0.05);
    }

    .search input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.14);
    }

    .search-results {
      position: absolute;
      z-index: 5;
      top: 54px;
      right: 0;
      left: 0;
      max-height: min(460px, 70vh);
      overflow: auto;
      display: none;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .search-results.open {
      display: block;
    }

    .result {
      width: 100%;
      padding: 14px 16px;
      background: transparent;
      border-bottom: 1px solid var(--line);
      text-align: left;
      color: var(--text);
    }

    .result:hover {
      background: #f7faff;
    }

    .result:last-child {
      border-bottom: 0;
    }

    .result-title {
      display: flex;
      gap: 12px;
      justify-content: space-between;
      margin-bottom: 6px;
      font-size: 13px;
      font-weight: 700;
    }

    .result-time {
      flex: 0 0 auto;
      color: var(--muted);
      font-weight: 500;
    }

    .result mark {
      padding: 0 2px;
      border-radius: 3px;
      background: #ffe58a;
      color: inherit;
    }

    .layout {
      display: grid;
      grid-template-columns: 340px minmax(0, 1fr);
      gap: 18px;
      align-items: start;
    }

    .sidebar,
    .detail {
      min-width: 0;
    }

    .section-title {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin: 0 0 10px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0;
      text-transform: uppercase;
    }

    .meeting-list {
      display: grid;
      gap: 10px;
    }

    .meeting-card {
      position: relative;
      width: 100%;
      display: grid;
      gap: 8px;
      padding: 14px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      text-align: left;
      color: var(--text);
      cursor: pointer;
      box-shadow: 0 10px 26px rgba(20, 32, 48, 0.04);
    }

    .meeting-card:focus-visible {
      outline: 2px solid var(--blue);
      outline-offset: 2px;
    }

    .meeting-card:hover,
    .meeting-card.active {
      border-color: var(--blue);
    }

    .meeting-card .delete-btn {
      position: absolute;
      top: 8px;
      right: 8px;
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      border: 1px solid transparent;
      border-radius: 6px;
      background: transparent;
      color: var(--muted);
      font-size: 16px;
      line-height: 1;
      opacity: 0;
      transition: opacity 0.15s ease, background 0.15s ease, color 0.15s ease;
    }

    .meeting-card:hover .delete-btn,
    .meeting-card .delete-btn:focus {
      opacity: 1;
    }

    .meeting-card .delete-btn:hover {
      background: #fee4e2;
      color: #b42318;
      border-color: #fda29b;
    }

    .meeting-card .delete-btn[disabled] {
      cursor: progress;
      opacity: 0.6;
    }

    .meeting-title {
      overflow-wrap: anywhere;
      font-weight: 750;
      line-height: 1.25;
    }

    .meeting-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      color: var(--muted);
      font-size: 12px;
    }

    .pill {
      display: inline-flex;
      min-height: 24px;
      align-items: center;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 2px 8px;
      background: #fafbfc;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.2;
    }

    .detail-header,
    .summary-panel,
    .empty-state {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: 0 10px 26px rgba(20, 32, 48, 0.04);
    }

    .detail-header {
      padding: 18px;
      margin-bottom: 14px;
    }

    .detail-header h2 {
      margin: 0 0 8px;
      overflow-wrap: anywhere;
      font-size: 22px;
      line-height: 1.2;
      letter-spacing: 0;
    }

    .timeline {
      display: grid;
      gap: 10px;
      margin-bottom: 14px;
    }

    .segment {
      display: grid;
      max-width: min(76%, 760px);
      gap: 5px;
    }

    .segment.mic {
      justify-self: start;
    }

    .segment.system {
      justify-self: end;
    }

    .bubble {
      padding: 12px 14px;
      border-radius: 8px;
      overflow-wrap: anywhere;
      line-height: 1.45;
      box-shadow: 0 8px 20px rgba(20, 32, 48, 0.06);
    }

    .mic .bubble {
      background: var(--blue-soft);
      color: #173f92;
      border: 1px solid #c8d9ff;
    }

    .system .bubble {
      background: var(--gray-soft);
      color: #364152;
      border: 1px solid #d9dee5;
    }

    .segment-meta {
      color: var(--muted);
      font-size: 11px;
    }

    .system .segment-meta {
      text-align: right;
    }

    .summary-panel {
      padding: 18px;
    }

    .summary-panel h3 {
      margin: 0 0 10px;
      font-size: 16px;
      letter-spacing: 0;
    }

    .summary-text {
      margin: 0;
      color: #2f3847;
      line-height: 1.55;
      white-space: pre-wrap;
    }

    .empty-state {
      padding: 32px;
      color: var(--muted);
      text-align: center;
    }

    .error {
      color: #b42318;
    }

    @media (max-width: 820px) {
      .shell {
        padding: 16px;
      }

      .topbar,
      .layout {
        grid-template-columns: 1fr;
      }

      .segment {
        max-width: 88%;
      }
    }

    @media (max-width: 520px) {
      .segment {
        max-width: 100%;
      }

      .result-title {
        display: grid;
        gap: 4px;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <div class="brand">
        <h1>Meetily</h1>
        <p>Meetings, transcripts, and summaries</p>
      </div>
      <div class="search">
        <input id="searchInput" type="search" placeholder="Search transcripts" autocomplete="off">
        <div id="searchResults" class="search-results" aria-live="polite"></div>
      </div>
    </header>

    <section class="layout">
      <aside class="sidebar">
        <div class="section-title">
          <span>Meetings</span>
          <span id="meetingCount">0</span>
        </div>
        <div id="meetingList" class="meeting-list"></div>
      </aside>

      <section id="detail" class="detail">
        <div class="empty-state">Select a meeting to view its transcript.</div>
      </section>
    </section>
  </main>

  <script>
    const state = {
      meetings: [],
      selectedMeetingId: null,
      searchTimer: null
    };

    const meetingList = document.getElementById("meetingList");
    const meetingCount = document.getElementById("meetingCount");
    const detail = document.getElementById("detail");
    const searchInput = document.getElementById("searchInput");
    const searchResults = document.getElementById("searchResults");

    function formatDate(value) {
      if (!value) return "No date";
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return value;
      return new Intl.DateTimeFormat(undefined, {
        month: "short",
        day: "numeric",
        year: "numeric",
        hour: "numeric",
        minute: "2-digit"
      }).format(date);
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function sanitizeSnippet(value) {
      return escapeHtml(value)
        .replaceAll("&lt;mark&gt;", "<mark>")
        .replaceAll("&lt;/mark&gt;", "</mark>");
    }

    function renderMeetings() {
      meetingCount.textContent = String(state.meetings.length);
      if (!state.meetings.length) {
        meetingList.innerHTML = '<div class="empty-state">No meetings yet.</div>';
        return;
      }

      meetingList.innerHTML = state.meetings.map((meeting) => `
        <div class="meeting-card ${meeting.id === state.selectedMeetingId ? "active" : ""}" data-meeting-id="${escapeHtml(meeting.id)}" role="button" tabindex="0">
          <button type="button" class="delete-btn" data-delete-id="${escapeHtml(meeting.id)}" data-delete-title="${escapeHtml(meeting.title || "Untitled Meeting")}" aria-label="Delete meeting" title="Delete meeting">&times;</button>
          <div class="meeting-title">${escapeHtml(meeting.title || "Untitled Meeting")}</div>
          <div class="meeting-meta">
            <span>${escapeHtml(formatDate(meeting.created_at))}</span>
            <span class="pill">${escapeHtml(meeting.status)}</span>
            <span class="pill">${meeting.segment_count} segments</span>
            ${meeting.has_summary ? '<span class="pill">summary</span>' : ""}
          </div>
        </div>
      `).join("");
    }

    function renderDetail(meeting) {
      const segments = meeting.transcript_segments || [];
      const summary = meeting.summary && meeting.summary.content
        ? escapeHtml(meeting.summary.content)
        : "No summary has been generated for this meeting.";

      detail.innerHTML = `
        <div class="detail-header">
          <h2>${escapeHtml(meeting.title || "Untitled Meeting")}</h2>
          <div class="meeting-meta">
            <span>${escapeHtml(formatDate(meeting.created_at))}</span>
            <span class="pill">${escapeHtml(meeting.status)}</span>
            <span class="pill">${segments.length} segments</span>
          </div>
        </div>
        <div class="timeline">
          ${segments.length ? segments.map((segment) => `
            <article class="segment ${segment.source === "system" ? "system" : "mic"}">
              <div class="bubble">${escapeHtml(segment.text)}</div>
              <div class="segment-meta">${escapeHtml(segment.source)}${segment.timestamp ? " | " + escapeHtml(segment.timestamp) : ""}</div>
            </article>
          `).join("") : '<div class="empty-state">No transcript segments yet.</div>'}
        </div>
        <div class="summary-panel">
          <h3>Summary</h3>
          <p class="summary-text">${summary}</p>
        </div>
      `;
    }

    async function loadMeetings() {
      meetingList.innerHTML = '<div class="empty-state">Loading meetings...</div>';
      const response = await fetch("/api/meetings");
      if (!response.ok) throw new Error("Failed to load meetings");
      state.meetings = await response.json();
      renderMeetings();
    }

    async function selectMeeting(meetingId) {
      state.selectedMeetingId = meetingId;
      renderMeetings();
      detail.innerHTML = '<div class="empty-state">Loading transcript...</div>';

      const response = await fetch(`/api/meetings/${encodeURIComponent(meetingId)}`);
      if (!response.ok) throw new Error("Failed to load meeting");
      renderDetail(await response.json());
    }

    async function runSearch(query) {
      const trimmed = query.trim();
      if (!trimmed) {
        searchResults.classList.remove("open");
        searchResults.innerHTML = "";
        return;
      }

      const response = await fetch(`/api/search?q=${encodeURIComponent(trimmed)}`);
      if (!response.ok) throw new Error("Search failed");
      const results = await response.json();

      searchResults.classList.add("open");
      searchResults.innerHTML = results.length ? results.map((result) => `
        <button class="result" data-meeting-id="${escapeHtml(result.meeting_id)}">
          <div class="result-title">
            <span>${escapeHtml(result.meeting_title || "Untitled Meeting")}</span>
            <span class="result-time">${escapeHtml(result.timestamp || "")}</span>
          </div>
          <div>${sanitizeSnippet(result.snippet)}</div>
        </button>
      `).join("") : '<div class="result">No matching transcript segments.</div>';
    }

    async function deleteMeeting(meetingId, title, btn) {
      const confirmed = window.confirm(`Delete meeting "${title}"? This cannot be undone.`);
      if (!confirmed) return;

      if (btn) btn.disabled = true;
      try {
        const response = await fetch(`/api/meetings/${encodeURIComponent(meetingId)}`, {
          method: "DELETE"
        });
        if (response.status !== 204 && !response.ok) {
          throw new Error(`Delete failed: ${response.status} ${response.statusText}`);
        }

        state.meetings = state.meetings.filter((m) => m.id !== meetingId);
        if (state.selectedMeetingId === meetingId) {
          state.selectedMeetingId = null;
          detail.innerHTML = '<div class="empty-state">Select a meeting to view its transcript.</div>';
        }
        renderMeetings();
      } catch (error) {
        if (btn) btn.disabled = false;
        showError(error);
      }
    }

    meetingList.addEventListener("click", (event) => {
      const deleteBtn = event.target.closest("[data-delete-id]");
      if (deleteBtn) {
        event.stopPropagation();
        deleteMeeting(deleteBtn.dataset.deleteId, deleteBtn.dataset.deleteTitle, deleteBtn).catch(showError);
        return;
      }
      const card = event.target.closest("[data-meeting-id]");
      if (card) selectMeeting(card.dataset.meetingId).catch(showError);
    });

    meetingList.addEventListener("keydown", (event) => {
      if (event.key !== "Enter" && event.key !== " ") return;
      const card = event.target.closest("[data-meeting-id]");
      if (!card || event.target.closest("[data-delete-id]")) return;
      event.preventDefault();
      selectMeeting(card.dataset.meetingId).catch(showError);
    });

    searchResults.addEventListener("click", (event) => {
      const result = event.target.closest("[data-meeting-id]");
      if (!result) return;
      searchResults.classList.remove("open");
      searchInput.blur();
      selectMeeting(result.dataset.meetingId).catch(showError);
    });

    document.addEventListener("click", (event) => {
      if (!event.target.closest(".search")) {
        searchResults.classList.remove("open");
      }
    });

    searchInput.addEventListener("input", () => {
      clearTimeout(state.searchTimer);
      state.searchTimer = setTimeout(() => {
        runSearch(searchInput.value).catch((error) => {
          searchResults.classList.add("open");
          searchResults.innerHTML = `<div class="result error">${escapeHtml(error.message)}</div>`;
        });
      }, 180);
    });

    function showError(error) {
      detail.innerHTML = `<div class="empty-state error">${escapeHtml(error.message)}</div>`;
    }

    loadMeetings()
      .then(() => {
        if (state.meetings[0]) {
          return selectMeeting(state.meetings[0].id);
        }
      })
      .catch(showError);
  </script>
</body>
</html>
